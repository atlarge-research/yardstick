---
- name: Deploy drive stat collection
  gather_facts: true
  hosts: all
  become: "{{ lookup('env', 'ANSIBLE_USE_SUDO') | default('false') == 'true' }}"
  become_method: sudo
  become_user: root
  tasks:
    - name: Create Diskstat directory
      file:
        path: "{{wd}}"
        state: directory
    - name: Copy disk stat collection script
      copy:
        src: "{{diskstat_script}}"
        dest: "{{wd}}"