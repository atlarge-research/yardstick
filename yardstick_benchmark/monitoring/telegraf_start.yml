---
- name: Start Telegraf
  gather_facts: true
  hosts: all
  become: "{{ lookup('env', 'ANSIBLE_USE_SUDO') | default('false') == 'true' }}"
  become_method: sudo
  become_user: root
  tasks:
    - name: Set fact for ANSIBLE_USE_SUDO
      set_fact:
        ansible_use_sudo: "{{ lookup('env', 'ANSIBLE_USE_SUDO') | default('false') == 'true' }}"
    - name: Find executable
      shell: |
        find {{wd}} -type f -executable -name telegraf
      register: find_telegraf
    - name: Run Telegraf under privelledged access
      shell:
        cmd: |
          nohup sh -c "sudo {{ find_telegraf.stdout }} --config telegraf-{{ inventory_hostname }}.conf --pidfile {{ wd }}/telegraf-{{ inventory_hostname }}.pid 2>&1 | sudo tee -a telegraf.log" > /dev/null &
        chdir: "{{wd}}"
      when: ansible_use_sudo == true
    - name: Run Telegraf under non-privelledged access
      shell:
        cmd: |
          nohup sh -c "{{ find_telegraf.stdout }} --config telegraf-{{ inventory_hostname }}.conf --pidfile {{ wd }}/telegraf-{{ inventory_hostname }}.pid 2>&1 | tee -a telegraf.log" > /dev/null &
        chdir: "{{wd}}"
      when: ansible_use_sudo != true
 
